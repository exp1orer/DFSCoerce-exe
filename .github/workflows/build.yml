name: DFSCoerce-CI

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. MSVC 环境（必须）
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # 3. MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 4. 恢复（如果有依赖）
      - name: Restore
        run: nuget restore DFSCoerce/DFSCoerce.sln

      # 5. 编译（关键修复点）
      - name: Build Release x64
        shell: cmd
        run: |
          msbuild DFSCoerce/DFSCoerce.sln /p:Configuration=Release /p:Platform=x64 /m

      # 6. 上传 exe
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DFSCoerce-x64
          path: "**/Release/*.exe"
